name: Auto PR: Dev → Main

on:
  push:
    branches:
      - dev

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request via GH CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head dev \
            --title "🚀 Auto PR: Dev → Main" \
            --body "This PR is automatically created from dev branch." \
          || echo "PR already exists or nothing to merge."